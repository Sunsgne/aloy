name: aloy

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aloy
      POSTGRES_PASSWORD: aloy
      POSTGRES_USER: aloy
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aloy -d aloy"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  victoria-metrics:
    image: victoriametrics/victoria-metrics:v1.117.1
    command:
      - "-retentionPeriod=30d"
      - "-storageDataPath=/storage"
    ports:
      - "8428:8428"
    volumes:
      - victoria-metrics-data:/storage
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8428/health"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
  victoria-metrics-data:

