openapi: 3.0.3
info:
  title: Aloy API
  version: 0.1.0
paths:
  /health:
    get:
      operationId: getHealth
      responses:
        "200":
          description: API is ready to accept requests.
  /api/v1/auth/login:
    post:
      operationId: login
      responses:
        "201":
          description: Access and refresh tokens.
        "401":
          description: Invalid credentials.
  /api/v1/auth/refresh:
    post:
      operationId: refreshToken
      responses:
        "201":
          description: Rotated access and refresh tokens.
        "401":
          description: Invalid or expired refresh token.
  /api/v1/auth/logout:
    post:
      operationId: logout
      responses:
        "201":
          description: Refresh token revoked.
  /api/v1/tenants:
    get:
      operationId: listTenants
      responses:
        "200":
          description: Active tenant list.
        "403":
          description: Missing tenant.read permission or platform access reason.
    post:
      operationId: createTenant
      responses:
        "201":
          description: Tenant created and audited.
  /api/v1/tenants/{id}:
    get:
      operationId: getTenant
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Tenant details.
    patch:
      operationId: updateTenant
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Tenant updated and audited.
    delete:
      operationId: deleteTenant
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Tenant soft deleted and audited.
  /api/v1/users:
    get:
      operationId: listUsers
      responses:
        "200":
          description: Current tenant users without password hashes.
    post:
      operationId: createUser
      responses:
        "201":
          description: Tenant user created and audited.
  /api/v1/users/{id}:
    patch:
      operationId: updateUser
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Tenant user updated and audited.
    delete:
      operationId: deleteUser
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Tenant user disabled, tokens revoked, and change audited.
  /api/v1/iam/permissions:
    get:
      operationId: listPermissions
      responses:
        "200":
          description: Platform permission catalog.
  /api/v1/iam/roles:
    get:
      operationId: listRoles
      responses:
        "200":
          description: Current tenant roles.
    post:
      operationId: createRole
      responses:
        "201":
          description: Tenant role created and audited.
  /api/v1/iam/roles/{id}:
    patch:
      operationId: updateRole
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Tenant role updated and audited.
    delete:
      operationId: deleteRole
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Tenant role soft deleted and audited.
