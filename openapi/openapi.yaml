openapi: 3.0.3
info:
  title: Aloy API
  version: 0.1.0
paths:
  /health:
    get:
      operationId: getHealth
      responses:
        "200":
          description: API is ready to accept requests.
  /api/v1/auth/login:
    post:
      operationId: login
      responses:
        "201":
          description: Access and refresh tokens.
        "401":
          description: Invalid credentials.
  /api/v1/auth/refresh:
    post:
      operationId: refreshToken
      responses:
        "201":
          description: Rotated access and refresh tokens.
        "401":
          description: Invalid or expired refresh token.
  /api/v1/auth/logout:
    post:
      operationId: logout
      responses:
        "201":
          description: Refresh token revoked.
