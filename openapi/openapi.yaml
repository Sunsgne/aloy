openapi: 3.0.3
info:
  title: Aloy API
  version: 0.1.0
paths:
  /health:
    get:
      operationId: getHealth
      responses:
        "200":
          description: API is ready to accept requests.
  /api/v1/auth/login:
    post:
      operationId: login
      responses:
        "201":
          description: Access and refresh tokens.
        "401":
          description: Invalid credentials.
  /api/v1/auth/refresh:
    post:
      operationId: refreshToken
      responses:
        "201":
          description: Rotated access and refresh tokens.
        "401":
          description: Invalid or expired refresh token.
  /api/v1/auth/logout:
    post:
      operationId: logout
      responses:
        "201":
          description: Refresh token revoked.
  /api/v1/tenants:
    get:
      operationId: listTenants
      responses:
        "200":
          description: Active tenant list.
        "403":
          description: Missing tenant.read permission or platform access reason.
    post:
      operationId: createTenant
      responses:
        "201":
          description: Tenant created and audited.
  /api/v1/tenants/{id}:
    get:
      operationId: getTenant
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Tenant details.
    patch:
      operationId: updateTenant
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Tenant updated and audited.
    delete:
      operationId: deleteTenant
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Tenant soft deleted and audited.
