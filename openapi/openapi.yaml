openapi: 3.0.3
info:
  title: Aloy API
  version: 0.1.0
paths:
  /health:
    get:
      operationId: getHealth
      responses:
        "200":
          description: API is ready to accept requests.
  /api/v1/auth/login:
    post:
      operationId: login
      responses:
        "201":
          description: Access and refresh tokens.
        "401":
          description: Invalid credentials.
  /api/v1/auth/refresh:
    post:
      operationId: refreshToken
      responses:
        "201":
          description: Rotated access and refresh tokens.
        "401":
          description: Invalid or expired refresh token.
  /api/v1/auth/logout:
    post:
      operationId: logout
      responses:
        "201":
          description: Refresh token revoked.
  /api/v1/tenants:
    get:
      operationId: listTenants
      responses:
        "200":
          description: Active tenant list.
        "403":
          description: Missing tenant.read permission or platform access reason.
    post:
      operationId: createTenant
      responses:
        "201":
          description: Tenant created and audited.
  /api/v1/tenants/{id}:
    get:
      operationId: getTenant
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Tenant details.
    patch:
      operationId: updateTenant
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Tenant updated and audited.
    delete:
      operationId: deleteTenant
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Tenant soft deleted and audited.
  /api/v1/users:
    get:
      operationId: listUsers
      responses:
        "200":
          description: Current tenant users without password hashes.
    post:
      operationId: createUser
      responses:
        "201":
          description: Tenant user created and audited.
  /api/v1/users/{id}:
    patch:
      operationId: updateUser
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Tenant user updated and audited.
    delete:
      operationId: deleteUser
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Tenant user disabled, tokens revoked, and change audited.
  /api/v1/iam/permissions:
    get:
      operationId: listPermissions
      responses:
        "200":
          description: Platform permission catalog.
  /api/v1/iam/roles:
    get:
      operationId: listRoles
      responses:
        "200":
          description: Current tenant roles.
    post:
      operationId: createRole
      responses:
        "201":
          description: Tenant role created and audited.
  /api/v1/iam/roles/{id}:
    patch:
      operationId: updateRole
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Tenant role updated and audited.
    delete:
      operationId: deleteRole
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Tenant role soft deleted and audited.
  /api/v1/subscription:
    get:
      operationId: getCurrentSubscription
      responses:
        "200":
          description: Current tenant active subscription and quotas.
  /api/v1/subscriptions:
    post:
      operationId: createSubscription
      responses:
        "201":
          description: Platform-created subscription and quota record.
  /api/v1/audit-events:
    get:
      operationId: listAuditEvents
      responses:
        "200":
          description: Tenant-scoped audit events.
  /api/v1/api-tokens:
    get:
      operationId: listApiTokens
      responses:
        "200":
          description: Current tenant API tokens without secrets or hashes.
    post:
      operationId: createApiToken
      responses:
        "201":
          description: API token created and its plaintext secret returned once.
  /api/v1/api-tokens/{id}:
    delete:
      operationId: revokeApiToken
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: API token revoked and change audited.
  /api/v1/sites:
    get:
      operationId: listSites
      responses:
        "200":
          description: Current tenant sites and device counts.
    post:
      operationId: createSite
      responses:
        "201":
          description: Site created and audited.
  /api/v1/devices:
    get:
      operationId: listDevices
      responses:
        "200":
          description: Current tenant RouterOS device inventory.
    post:
      operationId: createDevice
      responses:
        "201":
          description: Pending RouterOS device created and audited.
  /api/v1/devices/{id}/bootstrap-tokens:
    post:
      operationId: issueBootstrapToken
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "201":
          description: One-time bootstrap token and onboarding session created.
  /api/v1/devices/{id}/bootstrap-script:
    get:
      operationId: getBootstrapScript
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: query
          name: mode
          required: true
          schema: { type: string }
        - in: query
          name: apiBaseUrl
          required: true
          schema: { type: string, format: uri }
      responses:
        "200":
          description: Minimal HTTPS RouterOS bootstrap script with a one-time token.
  /api/v1/device-onboarding/register:
    post:
      operationId: registerDevice
      responses:
        "201":
          description: Bootstrap token consumed and device credential returned once.
        "401":
          description: Invalid, expired, reused, or serial-mismatched bootstrap token.
  /api/v1/device-reports/heartbeat:
    post:
      operationId: reportDeviceHeartbeat
      responses:
        "201":
          description: Authenticated device heartbeat and optional onboarding progress accepted.
        "401":
          description: Invalid device credential, timestamp, or replayed sequence.
  /api/v1/onboarding-sessions:
    get:
      operationId: listOnboardingSessions
      responses:
        "200":
          description: Current tenant RouterOS onboarding sessions and steps.
